#deploying for web
name: Deploy Pygame to GitHub Pages
on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.11

    - name: Install Pygbag and Requirements
      run: |
        pip install pygbag
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Build Web Version
      run: |
        python3 -m pygbag --build --no_opt --title "Coastline Clicker" .

    - name: Deploy to GitHub Pages
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: build/web
        branch: gh-pages